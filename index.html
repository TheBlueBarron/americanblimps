<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>American Blimps Redesign</title>

    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="nav">
      <div class="container">
        <h1 class="logo">American Blimps</h1>
        <button class="menu-toggle" onclick="toggleMenu()">☰</button>
        <nav id="menu">
          <a href="#">Products</a>
          <a href="#">Gallery</a>
          <a href="#">Contact</a>
        </nav>
      </div>
    </header>

    <section class="hero">
      <div class="container">
        <h2>Custom Advertising Blimps</h2>
        <p>Designed for events, retail visibility, and brand impact.</p>
        <a href="#" class="cta">Request a Quote</a>
      </div>
    </section>

    <section class="products container">
      <h3>Our Products</h3>
      <div class="grid">
        <div class="card">Indoor Blimps</div>
        <div class="card">Outdoor Blimps</div>
        <div class="card">Custom Shapes</div>
      </div>
    </section>

    <section class="contact container">
      <h3>Contact Us</h3>
      <form action="https://formsubmit.co/YOUR_EMAIL_HERE" method="POST">
        <input type="text" name="name" placeholder="Name" required />
        <input type="email" name="email" placeholder="Email" required />
        <textarea name="message" placeholder="Tell us what you need"></textarea>
        <button type="submit">Send</button>
      </form>
    </section>

    <footer>
      <p>© 2026 American Blimps</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
